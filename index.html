<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<html>
<body>
    <div class="img">
        <img id="gif" src="IMG_7852.GIF">
    </div>
    <div class="h1">
        <h1>你能和我在一起吗</h1>
    </div>
    <div class="button">
        <a href="okay.html">
           <button id="yes">能</button>  
        </a>
        <button id="no">不能</button>
    </div>

<script>
const yes = document.getElementById('yes');
const no = document.getElementById('no');
const gif = document.getElementById('gif');

let size = 70;
let count = 0;

no.addEventListener('click', function () {
  size += 80;
  yes.style.width = size + 'px';
  yes.style.height = size + 'px';

  count++;

  if (count === 1) {
    gif.src = "IMG_7848.GIF";
  }

  if (count === 2) {
    gif.src = "IMG_7847.GIF";
  }

  if (count === 3) {
    gif.src = "IMG_7849.GIF";
  }

  if (count === 4) {
    gif.src = "IMG_7850.GIF";
  }

  if (count === 5) {
    gif.src = "IMG_7851.GIF";
  }

  if (count >= 10) {
    no.style.display = 'none';
  }
});
</script>

</body>
</html>

<style>
    body {
        background-color: rgb(226, 212, 255);
        transform: scale(1.0);
    }

    .img {
        display: flex;
        justify-content: center;
        margin-top: 40%;
    }

    .h1 {
        text-align: center;
        
    }

    .button {
        display: flex;
        justify-content: center;
        gap: 20px;
        align-items: center;
    } 

    #yes {
        background-color: rgb(255, 0, 111);
        color: white;
        border: 2px solid rgb(255, 99, 206);
        padding: 15px;
        border-radius: 50px;
        width: 70px;
        font-size: 16px;
    }

    #no {
        background-color: rgb(26, 24, 162);
        color: white;
        border: 2px solid rgb(99, 102, 255);
        padding: 15px;
        border-radius: 50px;
        width: 70px;
        font-size: 16px;
    }
</style>
